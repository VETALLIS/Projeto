<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetallis</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Fonte moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <!-- topbar -->
    <header>
        <section class="topbar">
            <div class="topbar-logo">
                <img src="/static/imagens/vetalis_branca_sem_fundo.png" alt="Vetalis Logo">
                <span class="topbar-brand">Hello, {{session['usuario_nome']}}</span>
            </div>

            <div class="topbar-search">
                <i class="bi bi-search"></i>
                <input type="text" placeholder="Pesquisar...">
            </div>

            <div class="topbar-actions" style="text-decoration: none;">
                <a class="topbar-btn" href="{{ url_for('novo_produto') }}">
                    <i class="bi bi-plus-circle"></i> ADD Produtos
                </a>
                <button class="topbar-btn topbar-btn-icon">
                    <i class="bi bi-file-earmark-text"></i>
                </button>
                <button class="topbar-btn topbar-btn-icon">
                    <i class="bi bi-calendar3"></i>
                </button>
            </div>
        </section>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <nav class="sidebar-nav gap-2" style="margin-top: -20px;">
            <a href="{{ url_for('inicial') }}" class="sidebar-link active" title="Início">
                <i class="bi bi-house"></i>
            </a>
            <a   class="sidebar-link" title="Produtos">
                <i class="bi bi-capsule"></i>
            </a>
            <a href="#" class="sidebar-link" title="Relatórios">
                <i class="bi bi-graph-up"></i>
            </a>
            <a href="{{ url_for('gerenciar_perfil_atualizar', usuario_id=session.get('usuario_id')) }}" class="sidebar-link" title="Configurações">
                <i class="bi bi-gear"></i>
            </a>
            <a href="#" class="sidebar-link" title="Sensor">
                <i class="bi bi-radar"></i>
            </a>
            <a href="{{url_for('lista_compra')}}" class="sidebar-link" title="Lista de compra">
                <i class="bi bi-cart3"></i>
            </a>
            <a href="#" class="sidebar-link" title="Sair">
                <i class="bi bi-box-arrow-right"></i>
            </a>
            <a href="#" class="sidebar-link" title="Ajuda">
                <i class="bi bi-patch-question"></i>
            </a>
        </nav>
    </aside>
    <main class="d-flex justify-content-center align-items-center" style=" padding: 100px 5px 40px 120px;">
        <div class="login-card text-center me-4" style="max-width: 1400px; width: 100%; min-height: 575px !important;">
             {% block conteudo %} {% endblock %}
        </div>
    </main>

</body>
