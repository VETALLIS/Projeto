{% extends 'base.html'%}
{% block conteudo%}

        <div class="d-flex justify-content-start">
            <a href="" class="bi bi-arrow-bar-left text-white" style="text-decoration: none;">Voltar</a>
        </div>
        <h3 class="mb-4 mt-3 text-start" style="color: white; padding:5px; border-bottom:solid 1px #fff;">Cadastro de
            Fornecedor</h3>
        <form method="POST" action="" class="form-sensor">
            <div class=" mt-4">
                <div class="divisao-form me-4 " style=" width: 100%;">
                    <div class="mb-5 text-start">
                        <div class="input-group">
                            <input type="name" name="name" class="form-control" placeholder="Nome do fornecedor:"
                                required>
                        </div>
                    </div>

                    <div class="mb-5 text-start">
                        <div class="input-group">
                            <input type="text" name="endereco" class="form-control" placeholder="Endereço:" required>
                        </div>
                    </div>

                </div>
                <div class="d-flex">
                    <div class="me-4" style=" width: 100%;">
                        <div class="mb-5 text-start">
                            <div class="input-group">
                                <input type="text" name="tipo_produto" class="form-control"
                                    placeholder="Tipo de Produto:" required>
                            </div>
                        </div>
                        <div class="mb-5 text-start">
                            <div class="input-group">
                                <input type="text" name="pedido_minimo" class="form-control"
                                    placeholder="Pedido Mínimo:" required>
                            </div>
                        </div>
                    </div>
                    <div style=" width: 100%;">
                        <div class="mb-5 text-start">
                            <div class="input-group">
                                <input type="text" name="cnpj" class="form-control" placeholder="CNPJ:" required>
                            </div>
                        </div>
                        <div class="text-center">
                            <button class="btn btn-login w-100 text-white  "
                                style="background: #03c356; border-radius: 15px; "
                                type="submit">Cadastrar</button>
                        </div>
                    </div>

                </div>
            </div>

        </form>
    </div>


{% endblock%}
