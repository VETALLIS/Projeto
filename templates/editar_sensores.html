{% extends 'base.html'%}
{% block conteudo%}

<div class="d-flex justify-content-start">
    <a href="" class="bi bi-arrow-bar-left text-white" style="text-decoration: none; height: 40px;">Voltar</a>
</div>

<h3 class="text-start mt-4" style="color: white; padding:5px; border-bottom: solid 1px #fff;">
    Editar informações de Sensor
</h3>

<form method="POST" action="{{ url_for('atualizar_sensor', sensor_id=sensor['sensor_id']) }}" class="mt-4">
    <!-- Nome do sensor -->
    <div class="row mb-4">
        <div class="col-12">
            <input type="text" name="sensor_nome" class="form-control" placeholder="Nome do sensor:" required>
        </div>
    </div>

    <!-- Descrição + Número de série, Modelo, Voltagem -->
    <div class="row mb-4">
        <div class="col-12 col-md-7 mb-3 mb-md-0">
            <textarea name="sensor_descricao" placeholder="Descrição" class="form-control"
                style="height: 100px; resize: vertical; "></textarea>
        </div>
        <div class="col-12 col-md-5">
            <div class="mb-3">
                <input type="text" name="sensor_n_serie" class="form-control" placeholder="Número de série:" required>
            </div>
            <div class="row">
                <div class="col-6">
                    <input type="text" name="sensor_modelo" class="form-control" placeholder="Modelo:" required>
                </div>
                <div class="col-6">
                    <input type="number" name="sensor_voltagem" class="form-control" placeholder="Voltagem:" required>
                </div>
            </div>
        </div>
    </div>

    <!-- Tipo de conexão + Localização -->
    <div class="row mb-4">
        <div class="col-12 col-md-5 mb-3 mb-md-0">
            <input type="text" name="sensor_tipo_conexao" class="form-control" placeholder="Tipo de conexão:" required>
        </div>
        <div class="col-12 col-md-5">
            <input type="text" name="sensor_localizacao" class="form-control" placeholder="Localização:" required>
        </div>
    </div>

    <!-- Botão -->
    <div class="row">
        <div class="col-12 col-md-5">
            <button type="submit" class="btn w-100 text-white"
                style="background: #03c356; border-radius: 25px;">Editar</button>
        </div>
    </div>

</form>

{% endblock %}
