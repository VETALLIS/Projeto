{% extends 'base.html'%}
{% block conteudo%}

<div class="d-flex justify-content-start">
    <a href="" class="bi bi-arrow-bar-left text-white" style="text-decoration: none;">Voltar</a>
</div>
<h3 class="mb-4 mt-3 text-start" style="color: white; padding:5px; border-bottom:solid 1px #fff;">Adicionar item à
    lista de compras</h3>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for categoria, mensagem in messages %}
<div class="alert alert-{{ categoria }} text-center w-75 mx-auto" role="alert">
    {{ mensagem }}
</div>
{% endfor %}
{% endif %}
{% endwith %}

<form method="POST" action="{{ url_for('lista_compra') }}">
    <div class="mt-4">

        <div class="d-flex gap-3 mb-4" style="max-width: 1400px;">
            <input type="text" name="nome_item" placeholder="Nome do item:"
                style=" border:1.5px solid rgba(255,255,255,0.6); border-radius:10px; color:white; padding:12px 16px;width: 100%; max-width: 700px;"
                required>
            <input type="text" name="categoria" placeholder="Categoria:"
                style="border:1.5px solid rgba(255,255,255,0.6); border-radius:10px; color:white; padding:12px 16px; width: 100%; max-width: 700px;"
                required>
        </div>

    
        <div class="d-flex gap-3 mb-4" style="max-width: 1400px;">
            <input type="text" name="preco_unitario"  placeholder="preço unitário:"
                style=" border:1.5px solid rgba(255,255,255,0.6); border-radius:10px; color:white; padding:12px 16px;width: 100%; max-width: 466px; "
                required>
            <input type="text" name="quantidade"  placeholder="Quantidade:"
                style=" border:1.5px solid rgba(255,255,255,0.6); border-radius:10px; color:white; padding:12px 16px; width: 100%; max-width: 466px;"
                required>
            <input type="text" name="total"  placeholder="Total (R$):"
                style="border:1.5px solid rgba(255,255,255,0.6); border-radius:10px; color:white; padding:12px 16px; width: 100%; max-width: 466px;"
                required>
        </div>

        <!-- Botões lado a lado -->
        <div class="d-flex gap-3" style="max-width: 1400px;">
            <button class="btn w-100 text-white"
                style="background:#e31818; border-radius:15px; padding:7px;"
                type="button">Excluir conta</button>
            <button class="btn w-100 text-white"
                style="background:#03c356; border-radius:15px; padding:7px;"
                type="submit">Salvar alterações</button>
        </div>

    </div>
</form>

<style>
    .form-control::placeholder { color: rgba(255,255,255,0.7); }
    .form-control:focus { background:transparent !important; border-color:white !important; color:white !important; box-shadow:none; }
</style>

{% endblock %}
