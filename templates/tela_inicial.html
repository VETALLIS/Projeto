                            <i class="bi bi-sliders text-white"></i>

                        <p class="mb-1 ms-2 fs-2 mt-3 text-white" style="position: absolute; top: 15px; left: 15px;">

    <script>
        localStorage.setItem("usuario", JSON.stringify({

        }))


    </script>

</div>




<div class="d-flex colum mt-4" style=" border-radius: 15px;background: rgba(255, 255, 255, 0.15); 
    padding: 5px;max-width:1350px !important; width: 100% !important;height: 450px;">
    <label style=" margin-left: 0 !important; align-self: flex-start; z-index: 1000;"></label>

    <div class="table-responsive mt-3" style="width: 100%;;">
        <table class="table">
            <tr>
                <th class="text-white text-start">Nome</th>
                <th class="text-white fw-bold">Categoria</th>
                <th class="text-white">Quantidade</th>

            </tr>
            {% for produto in produtos %}
            <tr>
                <th class="text-white fw-normal align-items-start text-start">{{ produto.produto_nome }}</th>
                <th class="text-white fw-normal">{{ produto.produto_categoria }}</th>
                <th class="text-white fw-normal">{{ produto.estoque_quantidade }}</th>

            </tr>
            {% endfor %}
        </table>
    </div>
</div>


<script>
    localStorage.setItem("usuario", JSON.stringify({
        id: "{{ session.get('usuario_id')}}",
        nome: "{{ session.get('usuario_nome')}}",
        cargo: "{{ session.get('usuario_cargo')}}"
    }))


</script>
