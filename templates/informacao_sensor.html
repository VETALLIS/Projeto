{% extends 'base.html'%}
{% block conteudo%}

<div class="d-flex justify-content-start">
    <a href="" class="bi bi-arrow-bar-left text-white" style="text-decoration: none; height: 40px;">Voltar</a>
</div>

<h3 class="text-start mt-4" style="color: white; padding:5px; border-bottom: solid 1px rgba(255,255,255,0.3);">
    Informação do Sensor
</h3>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for categoria, mensagem in messages %}
<div class="alert alert-{{ categoria }} text-center w-75 mx-auto" role="alert">
    {{ mensagem }}
</div>
{% endfor %}
{% endif %}
{% endwith %}

<div class="mt-4">

    <!-- Nome -->
    <div class="p-3 mb-3" style="border-radius: 15px; background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.2);">
        <label style="color: rgba(255,255,255,0.6); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 6px;">Nome do sensor</label>
        <label style="color: #fff; font-size: 1.2rem; display: block;">{{sensor.sensor_nome}}</label>
    </div>

    <!-- Descrição -->
    <div class="p-3 mb-3" style="border-radius: 15px; background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.2);">
        <label style="color: rgba(255,255,255,0.6); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 6px;">Descrição</label>
        <label style="color: #fff; font-size: 1.2rem; display: block;">{{sensor.sensor_descricao}}</label>
    </div>

    <!-- Localização + Modelo -->
    <div class="row g-3 mb-3">
        <div class="col-6">
            <div class="p-3 h-100" style="border-radius: 15px; background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.2);">
                <label style="color: rgba(255,255,255,0.6); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 6px;">Localização</label>
                <label style="color: #fff; font-size: 1.2rem; display: block;">{{sensor.sensor_localizacao}}</label>
            </div>
        </div>
        <div class="col-6">
            <div class="p-3 h-100" style="border-radius: 15px; background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.2);">
                <label style="color: rgba(255,255,255,0.6); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 6px;">Modelo</label>
                <label style="color: #fff; font-size: 1.2rem; display: block;">{{sensor.sensor_modelo}}</label>
            </div>
        </div>
    </div>

    <!-- N série + Voltagem + Conexão -->
    <div class="row g-3">
        <div class="col-4">
            <div class="p-3 h-100" style="border-radius: 15px; background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.2);">
                <label style="color: rgba(255,255,255,0.6); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 6px;">N° de série</label>
                <label style="color: #fff; font-size: 1.2rem; display: block;">{{sensor.sensor_n_serie}}</label>
            </div>
        </div>
        <div class="col-4">
            <div class="p-3 h-100" style="border-radius: 15px; background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.2);">
                <label style="color: rgba(255,255,255,0.6); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 6px;">Voltagem</label>
                <label style="color: #fff; font-size: 1.2rem; display: block;">{{sensor.sensor_voltagem}}</label>
            </div>
        </div>
        <div class="col-4">
            <div class="p-3 h-100" style="border-radius: 15px; background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.2);">
                <label style="color: rgba(255,255,255,0.6); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 6px;">Tipo de conexão</label>
                <label style="color: #fff; font-size: 1.2rem; display: block;">{{sensor.sensor_tipo_conexao}}</label>
            </div>
        </div>
    </div>

</div>

{% endblock %}
