{% extends 'base.html'%}
{% block conteudo%}

<div class="d-flex justify-content-start">
    <a href="" class="bi bi-arrow-bar-left text-white" style="text-decoration: none; height: 40px;">Voltar</a>
</div>

<h3 class="text-start mt-4" style="color: white; padding:5px; border-bottom: solid 1px #fff;">
    Informação do Sensor
</h3>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for categoria, mensagem in messages %}
<div class="alert alert-{{ categoria }} text-center w-75 mx-auto" role="alert">
    {{ mensagem }}
</div>
{% endfor %}
{% endif %}
{% endwith %}

<form method="POST" action="{{ url_for('salvar_sensor') }}" class="mt-4">

    <!-- Nome do sensor -->
    <div class=" mb-4">
        <div class="d-flex mb-4">
            <label class="form-label" style="color: #fff; ">Nome do sensor:</label>
            <label for="" class="d-nome" style="color: #fff;">{{sensor.sensor_nome}}</label>
        </div>
    </div>

    <!-- Descrição + Número de série, Modelo, Voltagem -->
    <div class="d-flex colum mt-5 mb-4">
        <div class="d-flex mb-4" style="width: 50%;">
            <label class="form-label" style="color: #fff; ">Descrição:</label>
        </div>
        <div>
            <div class="mb-3">
                <label class="form-label" style="color: #fff; ">Localização:</label>
                <label for="" class="d-nome" style="color: #fff;">{{sensor.sensor_localizacao}}</label>
            </div>
            <div class="d-flex ">
                <div class="gap-2" style="width: 50%;">
                    <label class="form-label" style="color: #fff; ">Modelo:</label>
                    <label for="" class="d-nome" style="color: #fff;">{{sensor.sensor_modelo}}</label>
                </div>
            </div>
        </div>
    </div>

    <!-- Tipo de conexão + Localização -->
    <div class="d-flex mt-5 ">
        <div class="d-flex colum gap-2 " style="width: 25%;">
            <label class="form-label" style="color: #fff; ">N de serie:</label>
            <label for="" class="d-nome" style="color: #fff;">{{sensor.sensor_serie}}</label>
        </div>
        <div class="d-flex colum gap-2" style="width: 25%;">
            <label class="form-label" style="color: #fff; ">Voltagem:</label>
            <label for="" class="d-nome" style="color: #fff;">{{sensor.sensor_voltagem}}</label>
        </div>
        <div class="d-flex colum gap-2">
            <label class="form-label" style="color: #fff; ">Tipo de conexão:</label>
            <label for="" class="d-nome" style="color: #fff;">{{sensor.sensor_conexao}}</label>
        </div>
    </div>

</form>

{% endblock %}
