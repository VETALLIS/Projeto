{% extends 'base.html'%}
{% block conteudo %}

<div class="d-flex justify-content-between"
    style="color: white; padding:5px; border-bottom:solid 1px #fff; width: 100%;">
    <h3 class="mb-4 text-start">Sensores</h3>
    <a class="btn btn-login w-100 text-white d-flex justify-content-center"
        style="background: #03c356; border-radius: 15px; max-width: 20%; height: 50px; align-items: center;"
        href="{{url_for('novo_sensor')}}">Adicionar Sensor</a>
</div>

<div class="container d-flex entrada-container row" style="border: none; padding-left: 0; width: 100%;">
    {% if sensores %}
    {% for sensor in sensores %}
    <div class="card mb-3 text-white m-3"
        style="max-width: 25%; background-color: rgba(255, 255, 255, 0.05); border-radius: 13px; box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.2); min-height: 120px; position: relative;">

        <div class="row" style="border-radius: 13px;">
            <label class="upload-box" style="width: 120px; max-height: 120px;">
                <img src="data:{{sensor.imagem_tipo}};base64,{{sensor.imagem_base64}}"
                    style="max-height:120px; width:120px; border-radius:10px; object-fit:cover;">
            </label>
            <div class="col-md-7">
                <div class="card-body text-start d-flex gap-2">
                    <h3 class="fs-5">Nome:</h3>
                    <h5 class="card-title fs-6 mt-1">{{sensor.sensor_nome}}</h5>
                </div>
            </div>
        </div>

        <div class="container d-flex flex-column justify-content-between">
            <a href="/sensor/editar/{{sensor.sensor_id}}" class="bi bi-pencil text-white"
                style="text-decoration: none; position: absolute; bottom: 10px; right: 10px;"> Editar
            </a>

            <a class="btn btn-sm btn-link text-danger"
                style="text-decoration: none; position: absolute; bottom: 5px; right: 80px;"
                href="{{ url_for('excluir_sensor', sensor_id= sensor.sensor_id) }}">
                <i class="bi bi-trash"></i>
            </a>
        </div>

    </div>
    {% endfor %}
    {% else %}
    <p class="text-white text-center mt-4">Nenhum sensor cadastrado</p>
    {% endif %}
</div>

{% endblock %}
